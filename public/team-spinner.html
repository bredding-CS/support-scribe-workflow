<script>
function fitScale() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  document.getElementById('wrap').style.transform = `scale(${scale})`;
}
window.addEventListener('resize', fitScale);
fitScale();
const NAMES = ["Ben Redding","Bryan Castro","Carolyn VanderMolen","Chimaobi Ohaja","Chris Fitzgerald",
  "Diego Gomez","Guled Muhyadin Aw-Ali","Jacsen White","Karol Smulik","Mike Bialek",
  "Mike Callaway","Milena Wesołowska","Nicole Robison","Patricia Flores","Rob Rubinas"];
const PALETTE = ['#0aa7e8','#ede500','#0abb94','#edaf02','#82cef8','#ff702e','#e09bc4','#5f6ef7'];

let roster = NAMES.map(name => ({ name, present: true, picked: false }));
let rotation = 0, spinning = false, flickerInterval = null;

const wheelEl = document.getElementById('wheel');
const flickerEl = document.getElementById('flicker');
const winnerCardEl = document.getElementById('winnerCard');
const winnerNameEl = document.getElementById('winnerName');
const spinBtn = document.getElementById('spinBtn');
const resetBtn = document.getElementById('resetBtn');
const remainingEl = document.getElementById('remaining');
const rosterListEl = document.getElementById('rosterList');
const wheelBox = document.querySelector('.wheelBox');

function activeNames() { return roster.filter(r => r.present && !r.picked).map(r => r.name); }

function render() {
  const active = activeNames();
  const n = Math.max(active.length, 1);
  const seg = 360 / n;
  const labelRadius = 175;
  const stops = active.map((name, i) => `${PALETTE[i % PALETTE.length]} ${(i*seg).toFixed(3)}deg ${((i+1)*seg).toFixed(3)}deg`).join(', ');
  wheelEl.style.background = active.length ? `conic-gradient(from 0deg, ${stops})` : '#33455a';
  wheelEl.innerHTML = '';
  active.forEach((name, i) => {
    const center = i * seg + seg/2;
    let rot = center - 90; rot = ((rot % 360)+360)%360; if (rot > 90 && rot < 270) rot -= 180;
    const rad = center * Math.PI/180;
    const x = Math.sin(rad)*labelRadius, y = -Math.cos(rad)*labelRadius;
    const d = document.createElement('div');
    d.className = 'label';
    d.textContent = name;
    d.style.left = `calc(50% + ${x}px)`;
    d.style.top = `calc(50% + ${y}px)`;
    d.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;
    wheelEl.appendChild(d);
  });

  const presentCount = roster.filter(r => r.present).length;
  remainingEl.textContent = active.length === 0
    ? "Everyone's had a turn — hit Reset wheel to start a new round."
    : `${active.length} of ${presentCount} left in this round`;
  spinBtn.disabled = spinning || active.length === 0;
  spinBtn.textContent = spinning ? 'Spinning…' : (active.length === 0 ? 'Everyone picked!' : 'Spin the wheel');

  rosterListEl.innerHTML = '';
  roster.forEach(r => {
    const row = document.createElement('div');
    row.className = 'row' + (r.picked ? ' picked' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = r.present; cb.disabled = r.picked || spinning;
    cb.onchange = () => { r.present = cb.checked; render(); };
    const nameEl = document.createElement('div'); nameEl.className = 'name'; nameEl.textContent = r.name;
    row.appendChild(cb); row.appendChild(nameEl);
    if (r.picked) { const tag = document.createElement('div'); tag.className = 'doneTag'; tag.textContent = 'Done'; row.appendChild(tag); }
    const rm = document.createElement('button');
    rm.className = 'removeBtn'; rm.textContent = '✕'; rm.title = 'Remove';
    rm.disabled = spinning;
    rm.onclick = () => { roster = roster.filter(x => x !== r); render(); };
    row.appendChild(rm);
    rosterListEl.appendChild(row);
  });
}

function addName() {
  const input = document.getElementById('newName');
  const name = input.value.trim();
  if (!name) return;
  roster.push({ name, present: true, picked: false });
  input.value = '';
  render();
}

function spawnConfetti() {
  for (let i = 0; i < 46; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const size = 6 + Math.random()*6;
    el.style.left = (Math.random()*100) + '%';
    el.style.width = size + 'px';
    el.style.height = (size*0.6) + 'px';
    el.style.background = PALETTE[i % PALETTE.length];
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    const dur = 1.6 + Math.random()*1.1, delay = Math.random()*0.35;
    el.style.animation = `confetti-fall ${dur}s ${delay}s ease-in forwards`;
    wheelBox.appendChild(el);
    setTimeout(() => el.remove(), (dur+delay)*1000 + 100);
  }
}

function spin() {
  const active = activeNames();
  if (spinning || active.length === 0) return;
  const winnerIndex = Math.floor(Math.random()*active.length);
  const winnerName = active[winnerIndex];
  const seg = 360/active.length;
  const centerAngle = winnerIndex*seg + seg/2;
  const desiredFinalMod = ((360-centerAngle)%360+360)%360;
  const currentMod = ((rotation%360)+360)%360;
  let delta = desiredFinalMod - currentMod;
  if (delta < 0) delta += 360;
  const duration = 4;
  spinning = true;
  winnerCardEl.classList.remove('show');
  rotation += delta + 5*360;
  wheelEl.style.transition = `transform ${duration}s cubic-bezier(0.12,0.68,0.1,1)`;
  wheelEl.style.transform = `rotate(${rotation}deg)`;
  render();
  flickerEl.style.display = 'block';
  flickerInterval = setInterval(() => {
    const pool = activeNames();
    flickerEl.textContent = pool[Math.floor(Math.random()*pool.length)];
  }, 90);
  setTimeout(() => {
    clearInterval(flickerInterval); flickerInterval = null;
    flickerEl.style.display = 'none';
    spinning = false;
    roster.forEach(r => { if (r.name === winnerName) r.picked = true; });
    winnerNameEl.textContent = winnerName;
    winnerCardEl.classList.add('show');
    spawnConfetti();
    render();
  }, duration*1000 + 60);
}

function reset() {
  if (spinning) return;
  roster.forEach(r => r.picked = false);
  winnerCardEl.classList.remove('show');
  render();
}

async function generateQuestion() {
  const genBtn = document.getElementById('genBtn');
  genBtn.disabled = true;
  genBtn.textContent = '…';
  try {
    if (window.claude && window.claude.complete) {
      const text = await window.claude.complete(
        "Generate exactly one short, fun, light-hearted icebreaker question for a casual team meeting. " +
        "No preamble, no quotes, just the single question, under 20 words."
      );
      document.getElementById('qow').value = text.trim().replace(/^["']|["']$/g, '');
    } else {
      throw new Error('no claude api');
    }
  } catch (e) {
    document.getElementById('qow').value = FALLBACK_QUESTIONS[Math.floor(Math.random()*FALLBACK_QUESTIONS.length)];
  } finally {
    genBtn.disabled = false;
    genBtn.textContent = '🎲 Generate';
  }
}

spinBtn.onclick = spin;
resetBtn.onclick = reset;
document.getElementById('genBtn').onclick = generateQuestion;
document.getElementById('addNameBtn').onclick = addName;
document.getElementById('newName').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });
render();
</script>
