  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

nt-size:18px; color: var(--color-text-tertiary);\">Spin the wheel to pick this week's team update speaker.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:40px; padding:24px 56px 40px 56px; flex:1;\">\n\n    <div style=\"display:flex; flex-direction:column; align-items:center; gap:22px; flex:1;\">\n\n      <div style=\"position:relative; width:620px; height:620px; display:flex; align-items:center; justify-content:center;\">\n\n        <div style=\"{{ pointerStyle }}\"><\u002Fdiv>\n\n        <div style=\"{{ wheelOuterStyle }}\">\n          <div style=\"{{ wheelStyle }}\">\n            <sc-for list=\"{{ labelItems }}\" as=\"item\" hint-placeholder-count=\"15\">\n              <div style=\"{{ item.style }}\">{{ item.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"{{ hubStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ spinning }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"{{ flickerStyle }}\">{{ flickerName }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showWinnerCard }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"{{ winnerCardStyle }}\">\n            <div style=\"font-family: var(--font-family); font-size:15px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color: var(--color-brand);\">You're up!<\u002Fdiv>\n            <div style=\"font-family: var(--font-family); font-size:38px; font-weight:700; color: var(--color-text-primary); text-align:center;\">{{ winnerName }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ confettiEnabledResolved }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-for list=\"{{ confettiPieces }}\" as=\"piece\" hint-placeholder-count=\"0\">\n            <div style=\"{{ piece.style }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:16px;\">\n        <button style=\"{{ spinButtonStyle }}\" sc-camel-on-click=\"{{ handleSpin }}\" disabled=\"{{ spinDisabled }}\">{{ spinButtonLabel }}<\u002Fbutton>\n        <button style=\"{{ resetButtonStyle }}\" sc-camel-on-click=\"{{ handleReset }}\">Reset wheel<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"font-family: var(--font-family); font-size:14px; color: var(--color-text-tertiary);\">{{ remainingLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ cardStyle }}\">\n      <div style=\"font-family: var(--font-family); font-size:15px; font-weight:700; color: var(--color-text-primary); margin-bottom:14px;\">Who's in today?<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:2px; max-height:560px; overflow-y:auto;\">\n        <sc-for list=\"{{ rosterRows }}\" as=\"row\" hint-placeholder-count=\"15\">\n          <div style=\"{{ row.rowStyle }}\">\n            <span class=\"p-checkbox\" style=\"{{ row.checkboxWrapStyle }}\" sc-camel-on-click=\"{{ row.onToggle }}\">\n              <input class=\"p-checkbox-input\" type=\"checkbox\" checked=\"{{ row.present }}\" disabled=\"{{ row.picked }}\" sc-camel-read-only=\"{{ true }}\" style=\"{{ hiddenCheckboxInputStyle }}\">\n              <span style=\"{{ row.checkboxBoxStyle }}\">\n                <sc-if value=\"{{ row.present }}\" hint-placeholder-val=\"{{ false }}\">✓<\u002Fsc-if>\n              <\u002Fspan>\n            <\u002Fspan>\n            <div style=\"{{ row.textStyle }}\">{{ row.name }}<\u002Fdiv>\n            <sc-if value=\"{{ row.picked }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-family: var(--font-family); font-size:11px; font-weight:600; color: var(--color-success); text-transform:uppercase; letter-spacing:1px;\">Done<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;confettiEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;spinDurationSec&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:2,&quot;min&quot;:2,&quot;max&quot;:8,&quot;step&quot;:0.5,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;colorTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Colorful&quot;,&quot;options&quot;:[&quot;Colorful&quot;,&quot;Brand Monochrome&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\n\nconst NAMES = [\n  \"Ben Redding\", \"Bryan Castro\", \"Carolyn VanderMolen\", \"Chimaobi Ohaja\", \"Chris Fitzgerald\",\n  \"Diego Gomez\", \"Guled Muhyadin Aw-Ali\", \"Jacsen White\", \"Karol Smulik\", \"Mike Bialek\",\n  \"Mike Callaway\", \"Milena Wesołowska\", \"Nicole Robison\", \"Patricia Flores\", \"Rob Rubinas\"\n];\n\nconst PALETTE_COLORFUL = ['#0aa7e8', '#ede500', '#0abb94', '#edaf02', '#82cef8', '#ff702e', '#e09bc4', '#5f6ef7'];\nconst PALETTE_MONO = ['#1460aa', '#3e8fd6', '#0d4f8f', '#a8d1f2', '#0a3a66', '#c3e9fe', '#08253d', '#e8f3fd'];\n\nconst SUSPENSE_PHRASES_MULT = 6;\n\nclass Component extends DCLogic {\n  state = {\n    roster: NAMES.map(name => ({ name, present: true, picked: false })),\n    rotation: 0,\n    spinning: false,\n    winnerName: null,\n    showWinnerCard: false,\n    flickerName: '',\n    confettiPieces: [],\n    spinDurationSec: null,\n    scale: (typeof window !== 'undefined') ? Math.min(window.innerWidth / 1920, window.innerHeight / 1080, 1) : 1\n  };\n\n  flickerInterval = null;\n  revealTimeout = null;\n  confettiTimeout = null;\n  onResize = null;\n\n  componentDidMount() {\n    this.onResize = () => {\n      this.setState({ scale: Math.min(window.innerWidth / 1920, window.innerHeight / 1080, 1) });\n    };\n    window.addEventListener('resize', this.onResize);\n  }\n\n  componentWillUnmount() {\n    if (this.flickerInterval) clearInterval(this.flickerInterval);\n    if (this.revealTimeout) clearTimeout(this.revealTimeout);\n    if (this.confettiTimeout) clearTimeout(this.confettiTimeout);\n    if (this.onResize) window.removeEventListener('resize', this.onResize);\n  }\n\n  getActiveNames() {\n    return this.state.roster.filter(r => r.present && !r.picked).map(r => r.name);\n  }\n\n  toggleName(name) {\n    if (this.state.spinning) return;\n    this.setState(s => ({\n      roster: s.roster.map(r => r.name === name ? { ...r, present: !r.present } : r)\n    }));\n  }\n\n  handleSpin() {\n    if (this.state.spinning) return;\n    const active = this.getActiveNames();\n    if (active.length === 0) return;\n\n    const winnerIndex = Math.floor(Math.random() * active.length);\n    const winnerName = active[winnerIndex];\n    const segAngle = 360 / active.length;\n    const centerAngle = winnerIndex * segAngle + segAngle / 2;\n    const desiredFinalMod = ((360 - centerAngle) % 360 + 360) % 360;\n    const currentMod = ((this.state.rotation % 360) + 360) % 360;\n    let delta = desiredFinalMod - currentMod;\n    if (delta < 0) delta += 360;\n    const spins = 5;\n    const duration = (this.props.spinDurationSec ?? 4);\n\n    this.setState({\n      spinning: true,\n      showWinnerCard: false,\n      winnerName: null,\n      confettiPieces: [],\n      rotation: this.state.rotation + delta + spins * 360,\n      spinDurationSec: duration\n    });\n\n    this.flickerInterval = setInterval(() => {\n      const pool = this.getActiveNames();\n      this.setState({ flickerName: pool[Math.floor(Math.random() * pool.length)] });\n    }, 90);\n\n    this.revealTimeout = setTimeout(() => {\n      if (this.flickerInterval) { clearInterval(this.flickerInterval); this.flickerInterval = null; }\n      this.setState(s => ({\n        spinning: false,\n        winnerName,\n        showWinnerCard: true,\n        roster: s.roster.map(r => r.name === winnerName ? { ...r, picked: true } : r)\n      }));\n      this.spawnConfetti();\n    }, duration * 1000 + 60);\n  }\n\n  spawnConfetti() {\n    const colors = this.getPalette();\n    const pieces = Array.from({ length: 46 }, (_, i) => {\n      const color = colors[i % colors.length];\n      const left = Math.random() * 100;\n      const delay = Math.random() * 0.35;\n      const dur = 1.6 + Math.random() * 1.1;\n      const rotate = Math.random() * 360;\n      const size = 6 + Math.random() * 6;\n      return {\n        style: {\n          position: 'absolute',\n          top: '-10px',\n          left: left + '%',\n          width: size + 'px',\n          height: (size * 0.6) + 'px',\n          background: color,\n          borderRadius: '2px',\n          transform: `rotate(${rotate}deg)`,\n          animation: `confetti-fall ${dur}s ${delay}s ease-in forwards`,\n          zIndex: 30,\n          pointerEvents: 'none'\n        }\n      };\n    });\n    this.setState({ confettiPieces: pieces });\n    this.confettiTimeout = setTimeout(() => this.setState({ confettiPieces: [] }), 3200);\n  }\n\n  handleReset() {\n    if (this.state.spinning) return;\n    this.setState(s => ({\n      roster: s.roster.map(r => ({ ...r, picked: false })),\n      winnerName: null,\n      showWinnerCard: false,\n      confettiPieces: []\n    }));\n  }\n\n  getPalette() {\n    const theme = this.props.colorTheme ?? 'Colorful';\n    return theme === 'Brand Monochrome' ? PALETTE_MONO : PALETTE_COLORFUL;\n  }\n\n  renderVals() {\n    const active = this.getActiveNames();\n    const n = Math.max(active.length, 1);\n    const segAngle = 360 / n;\n    const palette = this.getPalette();\n    const radius = 310;\n    const labelRadius = 235;\n\n    const conicStops = active.map((name, i) => {\n      const color = palette[i % palette.length];\n      const from = (i * segAngle).toFixed(3);\n      const to = ((i + 1) * segAngle).toFixed(3);\n      return `${color} ${from}deg ${to}deg`;\n    }).join(', ');\n\n    const labelItems = active.map((name, i) => {\n      const centerAngle = i * segAngle + segAngle / 2;\n      let rot = centerAngle - 90;\n      rot = ((rot % 360) + 360) % 360;\n      if (rot > 90 && rot < 270) rot -= 180;\n      const rad = centerAngle * Math.PI / 180;\n      const x = Math.sin(rad) * labelRadius;\n      const y = -Math.cos(rad) * labelRadius;\n      return {\n        name,\n        style: {\n          position: 'absolute',\n          left: `calc(50% + ${x}px)`,\n          top: `calc(50% + ${y}px)`,\n          transform: `translate(-50%, -50%) rotate(${rot}deg)`,\n          fontFamily: 'var(--font-family)',\n          fontSize: '13px',\n          fontWeight: 600,\n          color: '#ffffff',\n          textShadow: '0 1px 3px rgba(0,0,0,0.55)',\n          whiteSpace: 'nowrap',\n          maxWidth: '150px',\n          textAlign: 'center',\n          pointerEvents: 'none'\n        }\n      };\n    });\n\n    const wheelOuterStyle = {\n      position: 'absolute',\n      width: (radius * 2) + 'px',\n      height: (radius * 2) + 'px',\n      borderRadius: '50%',\n      boxShadow: '0 18px 44px rgba(0,0,0,0.35), 0 0 0 10px #ffffff, 0 0 0 12px var(--color-border-secondary)',\n    };\n\n    const wheelStyle = {\n      width: '100%',\n      height: '100%',\n      borderRadius: '50%',\n      position: 'relative',\n      background: n > 0 ? `conic-gradient(from 0deg, ${conicStops})` : 'var(--color-gray-20)',\n      transform: `rotate(${this.state.rotation}deg)`,\n      transition: this.state.spinning ? `transform ${this.state.spinDurationSec ?? 4}s cubic-bezier(0.12, 0.68, 0.1, 1)` : 'none'\n    };\n\n    const hubStyle = {\n      position: 'absolute',\n      top: '50%', left: '50%',\n      width: '54px', height: '54px',\n      transform: 'translate(-50%, -50%)',\n      borderRadius: '50%',\n      background: '#ffffff',\n      boxShadow: '0 2px 8px ength === 0,\n      handleSpin: () => this.handleSpin(),\n      handleReset: () => this.handleReset(),\n      remainingLabel,\n      rosterRows\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
